name: Deploy application on scalingo

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      tag:
        type: string
        required: true
      environment:
        type: string
        required: true
    secrets:
      SCALINGO_API_TOKEN:
        required: true

jobs:
    deploy:
      name: "Deploy to ${{inputs.environment}}"
      environment: ${{inputs.environment}}
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v6
        - name: Download web artifact
          uses: actions/download-artifact@v6
          with:
            name: web-scalingo-${{ inputs.tag }}
        - name: Download api artifact
          uses: actions/download-artifact@v6
          with:
            name: api-scalingo-${{ inputs.tag }}
        - name: Install scalingo CLI
          run: |
            wget -qO- https://cli-dl.scalingo.com/install.sh | bash
            echo "$HOME/bin" >> $GITHUB_PATH
        - name: Login to scalingo
          run: scalingo login --api-token ${{ secrets.SCALINGO_API_TOKEN }}
        - name: Deploy web
          run: |
            echo "Deploying webapp on app ${{ vars.SCALINGO_APP_NAME }}"
            scalingo --region ${{vars.SCALINGO_APP_REGION}} --app ${{ vars.SCALINGO_APP_NAME }} deploy web-scalingo.tar.gz
        - name: Deploy api
          run: |
            echo "Deploying API on app ${{ vars.SCALINGO_API_APP_NAME }}"
            scalingo --region ${{vars.SCALINGO_APP_REGION}} --app ${{ vars.SCALINGO_API_APP_NAME }} deploy api-scalingo.tar.gz
        - name: Wait for deployment to stabilize
          run: sleep 30
        - name: Verify API health
          run: |
            API_URL="https://${{ vars.SCALINGO_API_APP_NAME }}.${{ vars.SCALINGO_APP_REGION }}.scalingo.io"
            echo "Checking API health at ${API_URL}/api/healthcheck"
            curl --retry 3 --retry-delay 10 --retry-all-errors -sf "${API_URL}/api/healthcheck" || echo "::warning::API health check failed — deployment may need manual verification"
