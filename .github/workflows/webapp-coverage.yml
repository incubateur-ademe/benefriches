# Informational, non-blocking web test coverage report.
# Runs on a weekly cron; failures (coverage below a per-feature threshold) surface via
# GitHub's default email notification for scheduled-workflow failures.

name: Webapp coverage

permissions:
  contents: read

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  webapp-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm --filter shared build
      - run: pnpm --filter web test:coverage
