name: End-to-end tests

permissions:
  contents: read

on:
  workflow_call:
    
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm

      - name: Build shared package
        run: pnpm --filter shared build

      - name: Install Playwright Browsers
        run: pnpm --filter e2e-tests exec playwright install --with-deps

      - name: Build Docker images
        run: docker compose --env-file .env.e2e -f docker-compose.e2e.yml build

      - name: Start E2E stack
        run: docker compose --env-file .env.e2e -f docker-compose.e2e.yml up -d --wait

      - name: Run Playwright tests
        run: pnpm --filter e2e-tests test:headless

      - name: Stop E2E stack
        if: always()
        run: docker compose --env-file .env.e2e -f docker-compose.e2e.yml down

      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report 
          path: apps/e2e-tests/playwright-report/
          retention-days: 7
