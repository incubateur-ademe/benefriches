name: End-to-end tests

permissions:
  contents: read

on:
  workflow_call:
    
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm

      - name: Build shared package
        run: pnpm --filter shared build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('apps/e2e-tests/package.json') }}

      - name: Install Playwright Browsers
        run: pnpm --filter e2e-tests exec playwright install --with-deps chromium

      # docker/bake-action (below) needs a buildx builder. Being an official Docker
      # action it also exposes the GitHub Actions cache runtime to BuildKit
      # automatically, so type=gha caching works without a third-party helper —
      # unlike a bare `docker buildx bake` invoked from a `run:` step.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # bake parses docker-compose.e2e.yml, which interpolates ${VARS} (ports, etc.);
      # without them compose parsing fails (e.g. "no port specified: :<empty>"). Export
      # the KEY=value lines of .env.e2e (skipping comments/blanks) into the job env.
      - name: Load .env.e2e into the job environment
        run: grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .env.e2e >> "$GITHUB_ENV"

      - name: Build Docker images
        uses: docker/bake-action@v6
        with:
          # Build from the checked-out workspace (v6+ otherwise defaults to a Git context).
          source: .
          files: docker-compose.e2e.yml
          load: true
          # Plain docker images for `compose up`; no attestation manifests to load.
          provenance: false
          # Per-image cache scopes: a shared scope (the "buildkit" default) would make
          # web and api overwrite each other's cache, leaving only the last built.
          set: |
            web.cache-from=type=gha,scope=e2e-web
            web.cache-to=type=gha,scope=e2e-web,mode=max
            api.cache-from=type=gha,scope=e2e-api
            api.cache-to=type=gha,scope=e2e-api,mode=max

      - name: Start E2E stack
        run: docker compose --env-file .env.e2e -f docker-compose.e2e.yml up -d --wait

      - name: Run Playwright tests
        run: pnpm --filter e2e-tests test:headless

      - name: Stop E2E stack
        if: always()
        run: docker compose --env-file .env.e2e -f docker-compose.e2e.yml down

      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report 
          path: apps/e2e-tests/playwright-report/
          retention-days: 7
