name: End-to-end tests

permissions:
  contents: read

on:
  workflow_call:
    
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm

      - name: Build shared package
        run: pnpm --filter shared build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('apps/e2e-tests/package.json') }}

      - name: Install Playwright Browsers
        run: pnpm --filter e2e-tests exec playwright install --with-deps chromium

      # Required for type=gha cache backend support in the build step below
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          set -a && source .env.e2e && set +a
          docker buildx bake \
            --file docker-compose.e2e.yml \
            --load \
            --set "*.cache-from=type=gha" \
            --set "*.cache-to=type=gha,mode=max"

      - name: Start E2E stack
        run: docker compose --env-file .env.e2e -f docker-compose.e2e.yml up -d --wait

      - name: Run Playwright tests
        run: pnpm --filter e2e-tests test:headless

      - name: Stop E2E stack
        if: always()
        run: docker compose --env-file .env.e2e -f docker-compose.e2e.yml down

      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report 
          path: apps/e2e-tests/playwright-report/
          retention-days: 7
