name: benefriches-dev

services:
  postgres:
    image: postgres:17-alpine
    restart: always
    ports:
      - '${DATABASE_PORT}:5432'
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-secret}
      POSTGRES_DB: ${DATABASE_DB_NAME:-benefriches_db}
    volumes:
      - benefriches_pg_data:/var/lib/postgresql/data
  mailcatcher:
    image: dockage/mailcatcher
    restart: always
    ports:
      - '${MAILCATCHER_HTTP_PORT}:1080'
      - '${SMTP_PORT}:1025'

volumes:
  benefriches_pg_data:
    name: ${PG_VOLUME_NAME:-benefriches_pg_data}